<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DXMOD CyberNexus Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --nb: #06b6d4; /* Neon Cyan */
      --np: #8b5cf6; /* Neon Purple */
      --em: #10b981; /* Emerald */
      --ro: #f43f5e; /* Rose */
      --am: #f59e0b; /* Amber */
      --glass: rgba(6, 11, 25, 0.7);
      --gb: rgba(255, 255, 255, 0.04);
      --neon-glow: 0 0 15px rgba(6, 182, 212, 0.15);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: #020617;
      color: #cbd5e1;
      overflow-x: hidden;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(6, 182, 212, 0.2);
    }
    
    .glass {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--gb);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .neon-border {
      position: relative;
    }
    .neon-border::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.3), rgba(139, 92, 246, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .neon-hover:hover {
      border-color: rgba(6, 182, 212, 0.4);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
      transform: translateY(-2px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glow-text-cyan {
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    }
    
    .glow-text-purple {
      text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.2; }
    }
    .pulse-glow {
      animation: pulse-glow 3s infinite ease-in-out;
    }

    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .sk {
      background: linear-gradient(90deg, #0b1329 25%, #1e294b 50%, #0b1329 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.8s ease-in-out infinite;
      border-radius: 8px;
    }
    
    .code-font {
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-cyber {
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .btn-cyber::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: all 0.4s;
    }
    .btn-cyber:hover::before {
      left: 100%;
    }

    /* ─── Premium Responsive CSS Sidebar & Content Layout ─── */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      z-index: 50;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .main-content {
      transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Desktop View Mode */
    @media (min-width: 769px) {
      .sidebar {
        transform: translateX(0) !important;
      }
      .main-content {
        margin-left: 260px;
      }
      .main-content.collapsed {
        margin-left: 76px;
      }
    }

    /* Mobile / Tablet / iPad View Mode */
    @media (max-width: 768px) {
      .sidebar {
        width: 260px !important;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content, .main-content.collapsed {
        margin-left: 0 !important;
      }
    }

    .modal-scroll {
      max-height: 85vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <!-- CONST CONSTELLATION BACKGROUND -->
  <canvas id="bg-canvas" class="fixed inset-0 z-[-2] pointer-events-none opacity-50"></canvas>
  
  <!-- GLOW CIRCLES -->
  <div class="fixed top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-cyan-500/5 blur-[130px] pointer-events-none z-[-1] pulse-glow"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-violet-500/5 blur-[130px] pointer-events-none z-[-1] pulse-glow" style="animation-delay: 1.5s;"></div>

  <div id="root"></div>

  <!-- CONSTELLATION JS -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 55; // Slightly reduced count for mobile performance

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.25;
        this.radius = Math.random() * 1.3 + 0.7;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(6, 182, 212, 0.25)';
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 110) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(139, 92, 246, ${0.11 * (1 - dist / 110)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>

  <!-- REACT APP -->
  <script src="/app.min.js"></script>
</body>
</html>
