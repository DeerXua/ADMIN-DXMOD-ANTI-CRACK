<html lang="vi">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    :root {
      --nb: #06b6d4; /* Neon Cyan */
      --np: #8b5cf6; /* Neon Purple */
      --em: #10b981; /* Emerald */
      --ro: #f43f5e; /* Rose */
      --am: #f59e0b; /* Amber */
      --glass: rgba(6, 11, 25, 0.7);
      --gb: rgba(255, 255, 255, 0.04);
      --neon-glow: 0 0 15px rgba(6, 182, 212, 0.15);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: #020617;
      color: #cbd5e1;
      overflow-x: hidden;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(6, 182, 212, 0.2);
    }
    
    .glass {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--gb);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .neon-border {
      position: relative;
    }
    .neon-border::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.3), rgba(139, 92, 246, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .neon-hover:hover {
      border-color: rgba(6, 182, 212, 0.4);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
      transform: translateY(-2px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glow-text-cyan {
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    }
    
    .glow-text-purple {
      text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.2; }
    }
    .pulse-glow {
      animation: pulse-glow 3s infinite ease-in-out;
    }

    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .sk {
      background: linear-gradient(90deg, #0b1329 25%, #1e294b 50%, #0b1329 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.8s ease-in-out infinite;
      border-radius: 8px;
    }
    
    .code-font {
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-cyber {
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .btn-cyber::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: all 0.4s;
    }
    .btn-cyber:hover::before {
      left: 100%;
    }

    /* ─── Premium Responsive CSS Sidebar & Content Layout ─── */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      z-index: 50;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .main-content {
      transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Desktop View Mode */
    @media (min-width: 769px) {
      .sidebar {
        transform: translateX(0) !important;
      }
      .main-content {
        margin-left: 260px;
      }
      .main-content.collapsed {
        margin-left: 76px;
      }
    }

    /* Mobile / Tablet / iPad View Mode */
    @media (max-width: 768px) {
      .sidebar {
        width: 260px !important;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content, .main-content.collapsed {
        margin-left: 0 !important;
      }
    }

    .modal-scroll {
      max-height: 85vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <!-- CONST CONSTELLATION BACKGROUND -->
  <canvas id="bg-canvas" class="fixed inset-0 z-[-2] pointer-events-none opacity-50"></canvas>
  
  <!-- GLOW CIRCLES -->
  <div class="fixed top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-cyan-500/5 blur-[130px] pointer-events-none z-[-1] pulse-glow"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-violet-500/5 blur-[130px] pointer-events-none z-[-1] pulse-glow" style="animation-delay: 1.5s;"></div>

  <div id="root"></div>

  <!-- CONSTELLATION JS -->
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 55; // Slightly reduced count for mobile performance

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.25;
        this.radius = Math.random() * 1.3 + 0.7;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(6, 182, 212, 0.25)';
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 110) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(139, 92, 246, ${0.11 * (1 - dist / 110)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>

  <!-- REACT APP -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── API Helpers ───
    const api = path => {
      const t = localStorage.getItem('dx_at');
      return fetch(path, {
        headers: t ? { Authorization: t } : {}
      }).then(r => {
        if (r.status === 401) {
          localStorage.removeItem('dx_at');
          window.location.reload();
        }
        return r.json();
      });
    };

    const apiPost = (path, body) => {
      const t = localStorage.getItem('dx_at');
      return fetch(path, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(t ? { Authorization: t } : {})
        },
        body: JSON.stringify(body)
      }).then(r => r.json());
    };

    const esc = s => {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    };

    const toast = (msg, type = 'success') => {
      const el = document.getElementById('t');
      el.textContent = msg;
      el.className = `fixed bottom-6 right-6 px-5 py-3 rounded-2xl text-sm font-semibold shadow-2xl z-[200] transition-all duration-300 ${
        type === 'success' 
          ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' 
          : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'
      }`;
      el.style.transform = 'translateY(0)';
      el.style.opacity = '1';
      setTimeout(() => {
        el.style.transform = 'translateY(20px)';
        el.style.opacity = '0';
      }, 3000);
    };

    const fmtDate = d => d ? new Date(d).toLocaleString('vi-VN') : '--';
    const fmtDur = s => {
      if (!s) return '--';
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ' + s % 60 + 's';
      return Math.floor(m / 60) + 'h ' + m % 60 + 'm';
    };

    // ─── Custom Hooks ───
    function useCounter(target, duration = 1200) {
      const [v, setV] = useState(0);
      const raf = useRef();
      const started = useRef(false);
      useEffect(() => {
        if (started.current) return;
        started.current = true;
        const s = performance.now();
        const fn = n => {
          const t = Math.min((n - s) / duration, 1);
          const e = 1 - Math.pow(1 - t, 3);
          setV(Math.round(target * e));
          if (t < 1) raf.current = requestAnimationFrame(fn);
        };
        raf.current = requestAnimationFrame(fn);
        return () => cancelAnimationFrame(raf.current);
      }, [target, duration]);
      return v;
    }

    // ─── Skeletons ───
    const Sk = ({ cn = '' }) => <div class={`sk ${cn}`} />;

    // ─── StatusBadge ───
    const Badge = ({ s }) => {
      const m = {
        active: { bg: 'rgba(16, 185, 129, 0.1)', c: '#10b981', l: 'Đã kích hoạt' },
        approved: { bg: 'rgba(16, 185, 129, 0.1)', c: '#10b981', l: 'Đã kích hoạt' },
        pending: { bg: 'rgba(245, 158, 11, 0.1)', c: '#f59e0b', l: 'Chờ duyệt' },
        expired: { bg: 'rgba(244, 63, 94, 0.1)', c: '#f43f5e', l: 'Hết hạn' }
      };
      const st = m[s.toLowerCase()] || m.pending;
      return (
        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold" style={{ background: st.bg, color: st.c }}>
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: st.c, boxShadow: `0 0 8px ${st.c}` }} />
          {st.l}
        </span>
      );
    };

    // ─── OnlineStatusBadge ───
    const OnlineBadge = ({ state }) => {
      const m = {
        in_match: { c: '#06b6d4', t: 'Trong trận', glow: 'rgba(6, 182, 212, 0.4)' },
        online: { c: '#10b981', t: 'Online', glow: 'rgba(16, 185, 129, 0.4)' },
        offline: { c: '#64748b', t: 'Offline', glow: 'transparent' }
      };
      const s = m[state] || m.offline;
      return (
        <span className="inline-flex items-center gap-2 text-xs font-semibold" style={{ color: s.c }}>
          <span className="w-2 h-2 rounded-full relative flex">
            {state !== 'offline' && <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{ background: s.c }} />}
            <span className="relative inline-flex rounded-full h-2 w-2" style={{ background: s.c, boxShadow: `0 0 8px ${s.glow}` }} />
          </span>
          {s.t}
        </span>
      );
    };

    // ─── PayloadBadge ───
    const PayloadBadge = ({ type }) => {
      const m = {
        free: { bg: 'rgba(100, 116, 139, 0.1)', c: '#94a3b8', l: 'FREE' },
        vip: { bg: 'rgba(139, 92, 246, 0.1)', c: '#a78bfa', l: 'VIP' },
        test: { bg: 'rgba(245, 158, 11, 0.1)', c: '#fbbf24', l: 'TEST' }
      };
      const st = m[String(type || 'free').toLowerCase()] || m.free;
      return (
        <span className="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold border" style={{ backgroundColor: st.bg, color: st.c, borderColor: `${st.c}20` }}>
          {st.l}
        </span>
      );
    };

    // ─── Login UI ───
    const Login = ({ onLogin }) => {
      const [p, setP] = useState('');
      const [e, setE] = useState('');
      const [load, setLoad] = useState(false);

      const h = async ev => {
        ev.preventDefault();
        setLoad(true);
        setE('');
        try {
          const r = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: p })
          });
          const d = await r.json();
          if (r.ok) {
            localStorage.setItem('dx_at', d.token);
            onLogin();
          } else {
            setE(d.error || 'Mật khẩu không chính xác!');
          }
        } catch (err) {
          setE('Lỗi kết nối máy chủ!');
        } finally {
          setLoad(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="glass neon-border rounded-3xl p-8 w-full max-w-md relative overflow-hidden">
            <div className="absolute top-0 right-0 w-24 h-24 bg-cyan-500/10 rounded-full blur-2xl pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl pointer-events-none"></div>
            
            <div className="text-center mb-8">
              <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-600 flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4 shadow-lg shadow-cyan-500/10">
                DX
              </div>
              <h1 className="text-white text-3xl font-extrabold tracking-tight glow-text-cyan">CYBERNEXUS</h1>
              <p className="text-cyan-400/60 text-xs font-semibold tracking-widest uppercase mt-1">LUA mod security system</p>
            </div>
            
            <form onSubmit={h} className="space-y-5">
              <div className="relative">
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔒</span>
                <input 
                  type="password" 
                  placeholder="MẬT KHẨU QUẢN TRỊ" 
                  value={p} 
                  onChange={e => setP(e.target.value)} 
                  required 
                  autoFocus
                  className="w-full h-12 pl-11 pr-4 rounded-2xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 placeholder-slate-700 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-semibold tracking-wider"
                />
              </div>
              {e && <p className="text-rose-400 text-xs text-center font-medium bg-rose-500/5 py-2 rounded-xl border border-rose-500/10">{e}</p>}
              
              <button 
                type="submit" 
                disabled={load}
                className="btn-cyber w-full h-12 rounded-2xl text-sm font-bold bg-gradient-to-r from-cyan-500 to-violet-600 text-white shadow-lg shadow-cyan-500/10 flex items-center justify-center gap-2 hover:shadow-cyan-500/20 active:scale-95 transition-all"
              >
                {load ? 'ĐANG XÁC THỰC...' : 'ĐĂNG NHẬP HỆ THỐNG'}
              </button>
            </form>
          </div>
        </div>
      );
    };

    // ─── KPI Card ───
    const Kpi = ({ icon, label, val, color }) => {
      const c = useCounter(val);
      const d = val >= 1e6 ? (val / 1e6).toFixed(1) + 'M' : val >= 1e3 ? (val / 1e3).toFixed(0) + 'K' : val;
      
      const theme = {
        cyan: 'from-cyan-400 to-sky-600 text-cyan-400 border-cyan-500/10',
        emerald: 'from-emerald-400 to-teal-600 text-emerald-400 border-emerald-500/10',
        amber: 'from-amber-400 to-orange-600 text-amber-400 border-amber-500/10',
        rose: 'from-rose-400 to-pink-600 text-rose-400 border-rose-500/10'
      }[color] || 'from-cyan-400 to-sky-600 text-cyan-400';

      return (
        <div className={`glass neon-hover rounded-3xl p-6 border border-white/5 relative overflow-hidden transition-all duration-300`}>
          <div className="flex items-center justify-between mb-4">
            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">{label}</span>
            <div className={`w-10 h-10 rounded-xl bg-gradient-to-br ${theme} bg-opacity-10 flex items-center justify-center text-xl`}>
              {icon}
            </div>
          </div>
          <div className="text-3xl font-extrabold text-white tabular-nums tracking-tight mb-1">{c}</div>
        </div>
      );
    };

    // ─── Confirm Dialog ───
    let _confirmResolve = null;
    const showConfirm = (title, body) => {
      document.getElementById('cm').style.display = 'flex';
      document.getElementById('ct').textContent = title;
      document.getElementById('cb').textContent = body;
      return new Promise(r => { _confirmResolve = r; });
    };
    const closeConfirm = v => {
      document.getElementById('cm').style.display = 'none';
      if (_confirmResolve) _confirmResolve(v);
    };

    // ─── Sidebar ───
    const Sidebar = ({ collapsed, onToggle, mobileOpen, onClose, tab, setTab }) => {
      const items = [
        { icon: '📊', label: 'Thiết bị', key: 'devices' },
        { icon: '🟢', label: 'Đang Online', key: 'online' },
        { icon: '🎮', label: 'Phiên đấu', key: 'sessions' },
        { icon: '👥', label: 'Tổng quan', key: 'users' }
      ];
      return (
        <>
          {/* Overlay on mobile when sidebar open */}
          <div 
            onClick={onClose} 
            className={`fixed inset-0 z-40 bg-slate-950/60 backdrop-blur-sm transition-opacity duration-300 md:hidden ${
              mobileOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'
            }`} 
          />
          <aside 
            className={`glass border-r border-white/5 sidebar flex flex-col overflow-hidden ${
              mobileOpen ? 'open' : ''
            } ${collapsed ? 'collapsed' : ''}`}
            style={{ width: collapsed ? 76 : 260 }}
          >
            <div className="flex items-center gap-3 px-5 h-20 shrink-0 border-b border-white/5">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-violet-600 flex items-center justify-center text-white text-lg font-bold shadow-lg shadow-cyan-500/10 border border-white/10">
                DX
              </div>
              {!collapsed && (
                <div className="flex flex-col">
                  <span className="text-white font-extrabold text-md tracking-tight glow-text-cyan">CYBERNEXUS</span>
                  <span className="text-[9px] text-cyan-400/50 font-bold uppercase tracking-wider">Mod administrator</span>
                </div>
              )}
            </div>
            
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              {items.map((item, i) => (
                <div 
                  key={i} 
                  onClick={() => { setTab(item.key); onClose(); }} 
                  className={`flex items-center gap-4 px-4 py-3 rounded-2xl cursor-pointer transition-all duration-200 text-sm font-semibold ${
                    tab === item.key 
                      ? 'bg-gradient-to-r from-cyan-500/15 to-violet-500/5 text-cyan-400 border border-cyan-500/20' 
                      : 'text-slate-400 hover:text-white hover:bg-white/5 border border-transparent'
                  }`}
                >
                  <span className="text-lg shrink-0">{item.icon}</span>
                  {(!collapsed || mobileOpen) && <span>{item.label}</span>}
                </div>
              ))}
            </nav>
            
            <div className="p-4 border-t border-white/5 hidden md:block">
              <button 
                onClick={onToggle} 
                className="w-full h-10 rounded-xl text-xs font-bold bg-white/5 border border-white/10 hover:bg-white/10 text-slate-400 hover:text-white transition-all flex items-center justify-center"
              >
                {collapsed ? '▶' : '◀ THU GỌN'}
              </button>
            </div>
          </aside>
        </>
      );
    };

    // ─── App Component ───
    const App = () => {
      const [logged, setLogged] = useState(!!localStorage.getItem('dx_at'));
      const [loading, setLoading] = useState(true);
      const [devices, setDevices] = useState([]);
      const [sessions, setSessions] = useState([]);
      const [onlineMap, setOnlineMap] = useState({});
      const [tab, setTab] = useState('devices');
      const [collapsed, setCollapsed] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all');
      const [payloadTypeTab, setPayloadTypeTab] = useState('all');
      const [sSearch, sSetSearch] = useState('');
      const [sFilter, sSetFilter] = useState('all');
      
      const [addOpen, setAddOpen] = useState(false);
      const [addUid, setAddUid] = useState('');
      const [addLabel, setAddLabel] = useState('');
      const [addPayloadType, setAddPayloadType] = useState('free');
      const [addExpiry, setAddExpiry] = useState('30days');
      const [addNote, setAddNote] = useState('');
      const [lastUpdated, setLastUpdated] = useState(new Date());

      const [statsData, setStatsData] = useState({ totalDevices: 0, onlineCount: 0, counts: { vip: 0, free: 0, test: 0, pending: 0, expired: 0 }, percentages: { vip: 0, free: 0, test: 0 } });
      const [tgModalOpen, setTgModalOpen] = useState(false);
      const [tgToken, setTgToken] = useState('');
      const [tgChatId, setTgChatId] = useState('');
      const [tgTesting, setTgTesting] = useState(false);

      const [onlineDevices, setOnlineDevices] = useState([]);
      const [oSearch, setOSearch] = useState('');

      const loadDevices = async () => { const d = await api('/api/admin/devices'); if (Array.isArray(d)) setDevices(d); };
      const loadSessions = async () => { const d = await api('/api/admin/sessions'); if (Array.isArray(d)) setSessions(d); };
      const loadStats = async () => { const s = await api('/api/admin/stats'); if (s && s.success) setStatsData(s); };

                    <div className="glass rounded-2xl p-5 text-center border border-cyan-500/10 relative">
                      <div className="text-4xl font-extrabold text-cyan-400 mb-2 tabular-nums">{inMatch}</div>
                      <div className="text-xs text-slate-400 font-semibold uppercase tracking-wider text-[9px]">Số người trong trận</div>
                    </div>
                    <div className="glass rounded-2xl p-5 text-center border border-white/5 relative">
                      <div className="text-4xl font-extrabold text-white mb-2 tabular-nums">{sessions.length}</div>
                      <div className="text-xs text-slate-400 font-semibold uppercase tracking-wider text-[9px]">Tổng số trận đấu</div>
                    </div>
                    <div className="glass rounded-2xl p-5 text-center border border-violet-500/10 relative">
                      <div className="text-4xl font-extrabold text-violet-400 mb-2 tabular-nums">{sessions.filter(s=>s.top1).length}</div>
                      <div className="text-xs text-slate-400 font-semibold uppercase tracking-wider text-[9px]">Đạt TOP 1 (Cúp Vàng)</div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>

          {/* ── EDIT LICENSE MODAL ── */}
          <div id="em" className="fixed inset-0 z-[100] bg-slate-950/70 backdrop-blur-md hidden items-center justify-center p-4" onClick={e=>e.target.id==='em'?document.getElementById('em').style.display='none':null}>
            <div className="glass neon-border rounded-3xl w-full max-w-xl p-6 md:p-8 relative modal-scroll">
              <div className="flex items-center justify-between mb-6">
                <h3 className="text-white font-extrabold text-lg glow-text-cyan">Cấu hình bản quyền</h3>
                <button onClick={()=>document.getElementById('em').style.display='none'} className="w-8 h-8 rounded-lg bg-white/5 hover:bg-rose-500/10 text-slate-400 hover:text-rose-400 border border-white/5 flex items-center justify-center transition-all">✕</button>
              </div>
              <form onSubmit={hSaveEdit} className="space-y-4">
                <input type="hidden" id="eu"/>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Tên hiển thị (Tên người chơi)</label>
                  <input id="el" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-semibold" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Trạng thái phê duyệt</label>
                  <select id="es" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-300 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all cursor-pointer font-semibold">
                    <option value="approved">✅ Phê duyệt kích hoạt</option>
                    <option value="pending">⏳ Đưa về hàng chờ duyệt</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Phân loại Payload (Quyền hạn)</label>
                  <select id="ep_type" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-300 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all cursor-pointer font-semibold">
                    <option value="free">🎁 Bản FREE</option>
                    <option value="vip">⭐ Bản VIP</option>
                    <option value="test">🧪 Bản TEST</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Thời hạn giấy phép</label>
                  <select id="exs" onChange={e=>document.getElementById('exc').style.display=e.target.value==='custom'?'block':'none'} className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-300 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all cursor-pointer font-semibold">
                    <option value="lifetime">♾️ Trọn đời (Vĩnh viễn)</option>
                    <option value="1day">1 Ngày</option>
                    <option value="7days">7 Ngày</option>
                    <option value="30days">30 Ngày</option>
                    <option value="custom">📅 Chọn ngày tuỳ ý</option>
                  </select>
                </div>
                <div id="exc" style={{display:'none'}}>
                  <input id="exd" type="datetime-local" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-semibold" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Ghi chú chi tiết</label>
                  <textarea id="en" rows="3" className="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all resize-none font-medium" />
                </div>
                <div className="flex justify-end gap-3 pt-3">
                  <button type="button" onClick={()=>document.getElementById('em').style.display='none'} className="h-11 px-5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-sm font-semibold text-slate-300 hover:text-white transition-all">Huỷ bỏ</button>
                  <button type="submit" className="h-11 px-6 rounded-xl bg-gradient-to-r from-cyan-500 to-violet-600 hover:shadow-lg hover:shadow-cyan-500/10 text-sm font-bold text-white transition-all btn-cyber">Lưu thiết lập</button>
                </div>
              </form>
            </div>
          </div>

          {/* ── ADD DEVICE MODAL ── */}
          <div id="am" className={`fixed inset-0 z-[100] bg-slate-950/70 backdrop-blur-md ${addOpen?'flex':'hidden'} items-center justify-center p-4`} onClick={e=>e.target.id==='am'?setAddOpen(false):null}>
            <div className="glass neon-border rounded-3xl w-full max-w-xl p-6 md:p-8 relative modal-scroll">
              <div className="flex items-center justify-between mb-6">
                <h3 className="text-white font-extrabold text-lg glow-text-cyan">Thêm thiết bị thủ công</h3>
                <button onClick={()=>setAddOpen(false)} className="w-8 h-8 rounded-lg bg-white/5 hover:bg-rose-500/10 text-slate-400 hover:text-rose-400 border border-white/5 flex items-center justify-center transition-all">✕</button>
              </div>
              <form onSubmit={hAdd} className="space-y-4">
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Mã UID thiết bị <span className="text-rose-400">*</span></label>
                  <input value={addUid} onChange={e=>setAddUid(e.target.value)} required placeholder="Ví dụ: AD68DB61-4A21-4054-..." className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-semibold" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Tên người dùng (Nhãn hiển thị)</label>
                  <input value={addLabel} onChange={e=>setAddLabel(e.target.value)} placeholder="Ví dụ: Nguyễn Văn A" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-semibold" />
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Phân loại Payload (Quyền hạn)</label>
                  <select value={addPayloadType} onChange={e=>setAddPayloadType(e.target.value)} className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-300 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all cursor-pointer font-semibold">
                    <option value="free">🎁 Bản FREE</option>
                    <option value="vip">⭐ Bản VIP</option>
                    <option value="test">🧪 Bản TEST</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Thời hạn giấy phép</label>
                  <select value={addExpiry} onChange={e=>setAddExpiry(e.target.value)} className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-300 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all cursor-pointer font-semibold">
                    <option value="lifetime">♾️ Trọn đời (Vĩnh viễn)</option>
                    <option value="1day">1 Ngày</option>
                    <option value="7days">7 Ngày</option>
                    <option value="30days">30 Ngày</option>
                    <option value="custom">📅 Chọn ngày tuỳ ý</option>
                  </select>
                </div>
                {addExpiry==='custom' && (
                  <div>
                    <input id="adx" type="datetime-local" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-semibold" />
                  </div>
                )}
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Ghi chú</label>
                  <textarea value={addNote} onChange={e=>setAddNote(e.target.value)} rows="3" placeholder="Nhập ghi chú hoặc thông tin khách hàng..." className="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all resize-none font-medium" />
                </div>
                <div className="flex justify-end gap-3 pt-3">
                  <button type="button" onClick={()=>setAddOpen(false)} className="h-11 px-5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-sm font-semibold text-slate-300 hover:text-white transition-all">Huỷ bỏ</button>
                  <button type="submit" className="h-11 px-6 rounded-xl bg-gradient-to-r from-cyan-500 to-violet-600 hover:shadow-lg hover:shadow-cyan-500/10 text-sm font-bold text-white transition-all btn-cyber">Thêm thiết bị</button>
                </div>
              </form>
            </div>
          </div>

          {/* ── TELEGRAM BOT SETTINGS MODAL ── */}
          <div id="tm" className={`fixed inset-0 z-[100] bg-slate-950/70 backdrop-blur-md ${tgModalOpen?'flex':'hidden'} items-center justify-center p-4`} onClick={e=>e.target.id==='tm'?setTgModalOpen(false):null}>
            <div className="glass neon-border rounded-3xl w-full max-w-xl p-6 md:p-8 relative modal-scroll">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-2">
                  <span className="text-xl">📱</span>
                  <h3 className="text-white font-extrabold text-lg glow-text-cyan">Cấu hình Thông báo Telegram Bot</h3>
                </div>
                <button onClick={()=>setTgModalOpen(false)} className="w-8 h-8 rounded-lg bg-white/5 hover:bg-rose-500/10 text-slate-400 hover:text-rose-400 border border-white/5 flex items-center justify-center transition-all">✕</button>
              </div>
              <form onSubmit={saveTelegram} className="space-y-4">
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Telegram Bot Token</label>
                  <input value={tgToken} onChange={e=>setTgToken(e.target.value)} placeholder="Ví dụ: 7123456789:AAE...xyz" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-mono" />
                  <p className="text-[11px] text-slate-500 mt-1">Lấy token từ BotFather trên Telegram (@BotFather)</p>
                </div>
                <div>
                  <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-2">Telegram Chat ID (ID của bạn hoặc Nhóm)</label>
                  <input value={tgChatId} onChange={e=>setTgChatId(e.target.value)} placeholder="Ví dụ: 1234567890" className="w-full h-11 px-4 rounded-xl bg-slate-950/40 border border-white/5 text-sm text-gray-200 outline-none focus:border-cyan-500/40 focus:bg-slate-950/80 transition-all font-mono" />
                  <p className="text-[11px] text-slate-500 mt-1">Lấy ID chat cá nhân từ bot @userinfobot hoặc @myidbot</p>
                </div>
                <div className="p-4 rounded-2xl bg-cyan-500/5 border border-cyan-500/10 text-xs text-slate-300 space-y-1">
                  <div className="font-bold text-cyan-400 mb-1">💡 Các thông báo sẽ nhận qua Telegram:</div>
                  <div>• 📱 Khi có **thiết bị mới tự động đăng ký** (FREE 7 ngày).</div>
                  <div>• 👑 Khi bạn **duyệt hoặc nâng cấp VIP** cho thiết bị.</div>
                </div>
                <div className="flex justify-between items-center pt-3 gap-3">
                  <button type="button" onClick={testTelegram} disabled={tgTesting} className="h-11 px-4 rounded-xl bg-violet-500/10 border border-violet-500/20 hover:bg-violet-500/20 text-xs font-bold text-violet-400 transition-all flex items-center gap-2">
                    {tgTesting ? '⏳ Đang gửi...' : '🔔 Gửi tin nhắn thử'}
                  </button>
                  <div className="flex gap-2">
                    <button type="button" onClick={()=>setTgModalOpen(false)} className="h-11 px-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-xs font-semibold text-slate-300 hover:text-white transition-all">Đóng</button>
                    <button type="submit" className="h-11 px-5 rounded-xl bg-gradient-to-r from-cyan-500 to-violet-600 hover:shadow-lg hover:shadow-cyan-500/10 text-xs font-bold text-white transition-all btn-cyber">Lưu cấu hình</button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          {/* ── DANGER CONFIRM MODAL ── */}
          <div id="cm" className="fixed inset-0 z-[100] bg-slate-950/70 backdrop-blur-md hidden items-center justify-center p-4">
            <div className="glass neon-border rounded-3xl w-full max-w-sm p-6 relative">
              <h3 id="ct" className="text-white font-extrabold text-lg mb-2 glow-text-purple">Xác nhận tác vụ</h3>
              <p id="cb" className="text-slate-400 text-sm mb-6 leading-relaxed">Nội dung</p>
              <div className="flex justify-end gap-3">
                <button id="cc" onClick={()=>closeConfirm(false)} className="close-c h-10 px-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-sm font-semibold text-slate-300 hover:text-white transition-all">Huỷ bỏ</button>
                <button id="co" onClick={()=>closeConfirm(true)} className="h-10 px-5 rounded-xl bg-gradient-to-r from-rose-500 to-pink-600 hover:shadow-lg hover:shadow-rose-500/10 text-sm font-bold text-white transition-all btn-cyber">Xác nhận</button>
              </div>
            </div>
          </div>

          {/* ── SYSTEM TOAST ── */}
          <div id="t" style={{ transform: 'translateY(20px)', opacity: 0 }} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
